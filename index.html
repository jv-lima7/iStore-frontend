<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iStore — Sistema de Compras</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #f5f5f5;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --muted: #666;
    --danger: #e05252;
    --success: #4caf7d;
    --text: #f0f0f0;
    --text2: #aaa;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  @media (max-width: 768px) {

  /* AUTH */
  .auth-card {
    padding: 32px 24px;
    margin: 16px;
  }

  /* NAVBAR */
  nav {
    padding: 0 16px;
    flex-wrap: wrap;
    height: auto;
    gap: 8px;
    padding: 12px 16px;
  }

  .nav-right {
    gap: 12px;
    flex-wrap: wrap;
  }

  .nav-user {
    display: none;
  }

  /* MAIN */
  main {
    padding: 24px 16px;
  }

  .section-title {
    font-size: 28px;
  }

  /* PRODUTOS */
  .products-grid {
    grid-template-columns: 1fr;
  }

  /* CARRINHO */
  .cart-panel {
    width: 100%;
  }

  .cart-header {
    padding: 20px 20px 16px;
  }

  .cart-items {
    padding: 16px 20px;
  }

  .cart-footer {
    padding: 16px 20px 24px;
  }
}

  /* PAGES */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; }

  /* AUTH PAGES */
  #page-login, #page-cadastro, #page-redefinir {
    align-items: center;
    justify-content: center;
    background: var(--bg);
    position: relative;
  }

  .auth-bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 50%, #1a1200 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, #0d1a0d 0%, transparent 50%);
    pointer-events: none;
  }

  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 48px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    animation: fadeUp .4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .auth-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: var(--gold);
    letter-spacing: 4px;
    margin-bottom: 4px;
  }

  .auth-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 36px;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 14px 16px;
    outline: none;
    transition: border-color .2s;
    margin-bottom: 20px;
  }

  input:focus { border-color: var(--gold); }

  .btn {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    border-radius: 2px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: background .2s, transform .1s;
    margin-top: 4px;
  }

  .btn:hover { background: var(--gold2); }
  .btn:active { transform: scale(.98); }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
    margin-top: 12px;
  }

  .btn-ghost:hover { background: var(--surface2); color: var(--text); }

  .btn-danger {
    background: var(--danger);
    color: #fff;
  }
  .btn-danger:hover { background: #c94444; }

  .auth-link {
    text-align: center;
    margin-top: 24px;
    font-size: 13px;
    color: var(--muted);
  }

  .auth-link a {
    color: var(--gold);
    text-decoration: none;
    cursor: pointer;
  }

  .auth-link a:hover { color: var(--gold2); }

  .msg {
    padding: 12px 16px;
    border-radius: 2px;
    font-size: 13px;
    margin-bottom: 20px;
    display: none;
  }

  .msg.error { background: #2a1414; border: 1px solid var(--danger); color: var(--danger); display: block; }
  .msg.success { background: #142a1e; border: 1px solid var(--success); color: var(--success); display: block; }

  /* MAIN APP */
  #page-app {
    flex-direction: column;
  }

  /* NAVBAR */
  nav {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold);
    letter-spacing: 3px;
  }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .nav-user {
    font-size: 13px;
    color: var(--muted);
  }

  .cart-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 20px;
    cursor: pointer;
    transition: border-color .2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .cart-btn:hover { border-color: var(--gold); }

  .cart-count {
    background: var(--gold);
    color: #000;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 11px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    cursor: pointer;
    padding: 0;
  }

  .logout-btn:hover { color: var(--danger); }

  /* MAIN CONTENT */
  main {
    flex: 1;
    padding: 48px 40px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 36px;
    letter-spacing: 3px;
    color: var(--text);
    margin-bottom: 8px;
  }

  .section-sub {
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 36px;
    letter-spacing: .5px;
  }

  /* PRODUCTS GRID */
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 28px;
    transition: border-color .2s, transform .2s;
    animation: fadeUp .4s ease both;
  }

  .product-card:hover {
    border-color: var(--gold);
    transform: translateY(-2px);
  }

  .product-model {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }

  .product-name {
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 16px;
    line-height: 1.2;
  }

  .product-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 1px;
    color: var(--gold2);
    margin-bottom: 4px;
  }

  .product-stock {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 20px;
  }

  .product-stock.low { color: var(--danger); }

  .qty-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .qty-input {
    width: 60px;
    text-align: center;
    margin-bottom: 0;
    padding: 10px 8px;
  }

  .add-btn {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 16px;
    cursor: pointer;
    transition: background .2s, border-color .2s;
    letter-spacing: .5px;
  }

  .add-btn:hover { background: var(--gold); color: #000; border-color: var(--gold); }

  /* CART PANEL */
  .cart-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.7);
    z-index: 200;
    display: none;
    animation: fadeIn .2s ease;
  }

  .cart-overlay.open { display: block; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .cart-panel {
    position: fixed;
    right: 0;
    top: 0;
    bottom: 0;
    width: 420px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    z-index: 201;
    display: flex;
    flex-direction: column;
    transform: translateX(100%);
    transition: transform .3s ease;
  }

  .cart-panel.open { transform: translateX(0); }

  .cart-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .cart-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    letter-spacing: 2px;
  }

  .close-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 24px;
    cursor: pointer;
    line-height: 1;
  }

  .close-btn:hover { color: var(--text); }

  .cart-items {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
  }

  .cart-empty {
    text-align: center;
    color: var(--muted);
    font-size: 14px;
    margin-top: 60px;
  }

  .cart-item {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    animation: fadeUp .3s ease;
  }

  .cart-item-info { flex: 1; }

  .cart-item-name {
    font-size: 14px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .cart-item-qty {
    font-size: 12px;
    color: var(--muted);
  }

  .cart-item-price {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--gold2);
    letter-spacing: 1px;
  }

  .remove-item {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 0 0 0 12px;
    line-height: 1;
  }

  .remove-item:hover { color: var(--danger); }

  .cart-footer {
    padding: 20px 28px 28px;
    border-top: 1px solid var(--border);
  }

  .cart-total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }

  .cart-total-label {
    font-size: 12px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .cart-total-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: var(--gold);
    letter-spacing: 1px;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 2px;
    padding: 14px 24px;
    font-size: 14px;
    z-index: 300;
    transition: transform .3s ease;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success-toast { border-color: var(--success); color: var(--success); }
  .toast.error-toast { border-color: var(--danger); color: var(--danger); }

  /* LOADING */
  .loading {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(0,0,0,.3);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .skeleton {
    background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    border-radius: 2px;
  }

  @keyframes shimmer { to { background-position: -200% 0; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="page-login" class="page active">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">iStore</div>
    <div class="auth-sub">Sistema de Compras</div>
    <div id="login-msg" class="msg"></div>
    <label>Email</label>
    <input type="email" id="login-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="login-senha" placeholder="••••••">
    <button class="btn" onclick="fazerLogin()">Entrar</button>
    <button class="btn btn-ghost" onclick="irPara('page-redefinir')">Esqueci minha senha</button>
    <div class="auth-link">Não tem conta? <a onclick="irPara('page-cadastro')">Cadastre-se</a></div>
  </div>
</div>

<!-- CADASTRO -->
<div id="page-cadastro" class="page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">iStore</div>
    <div class="auth-sub">Criar conta</div>
    <div id="cad-msg" class="msg"></div>
    <label>Email</label>
    <input type="email" id="cad-email" placeholder="seu@email.com">
    <label>CPF (somente números)</label>
    <input type="text" id="cad-cpf" placeholder="12345678901" maxlength="11">
    <label>Senha</label>
    <input type="password" id="cad-senha" placeholder="mínimo 6 caracteres">
    <label>Confirmar senha</label>
    <input type="password" id="cad-confirma" placeholder="repita a senha">
    <button class="btn" onclick="fazerCadastro()">Criar conta</button>
    <div class="auth-link">Já tem conta? <a onclick="irPara('page-login')">Entrar</a></div>
  </div>
</div>

<!-- REDEFINIR SENHA -->
<div id="page-redefinir" class="page">
  <div class="auth-bg"></div>
  <div class="auth-card">
    <div class="auth-logo">iStore</div>
    <div class="auth-sub">Redefinir senha</div>
    <div id="rdf-msg" class="msg"></div>
    <label>Email</label>
    <input type="email" id="rdf-email" placeholder="seu@email.com">
    <label>CPF (somente números)</label>
    <input type="text" id="rdf-cpf" placeholder="12345678901" maxlength="11">
    <label>Nova senha</label>
    <input type="password" id="rdf-senha" placeholder="mínimo 6 caracteres">
    <button class="btn" onclick="redefinirSenha()">Redefinir senha</button>
    <button class="btn btn-ghost" onclick="irPara('page-login')">Voltar ao login</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="page-app" class="page">
  <nav>
    <div class="nav-logo">iStore</div>
    <div class="nav-right">
      <span class="nav-user" id="nav-email"></span>
      <button class="cart-btn" onclick="abrirCarrinho()">
        🛒 Carrinho
        <span class="cart-count" id="cart-count">0</span>
      </button>
      <button class="logout-btn" onclick="logout()">Sair</button>
    </div>
  </nav>

  <main>
    <div class="section-title">Produtos</div>
    <div class="section-sub">Selecione um produto e adicione ao carrinho</div>
    <div class="products-grid" id="products-grid">
      <!-- produtos carregados via JS -->
    </div>
  </main>
</div>

<!-- CARRINHO OVERLAY -->
<div class="cart-overlay" id="cart-overlay" onclick="fecharCarrinho()"></div>
<div class="cart-panel" id="cart-panel">
  <div class="cart-header">
    <div class="cart-title">Carrinho</div>
    <button class="close-btn" onclick="fecharCarrinho()">×</button>
  </div>
  <div class="cart-items" id="cart-items">
    <div class="cart-empty">Seu carrinho está vazio</div>
  </div>
  <div class="cart-footer">
    <div class="cart-total-row">
      <span class="cart-total-label">Total</span>
      <span class="cart-total-value" id="cart-total">R$ 0,00</span>
    </div>
    <button class="btn" onclick="finalizarCompra()">Finalizar compra</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://sistema-compra-sb.onrender.com';
let usuarioId = null;

// ─── NAVEGAÇÃO ───────────────────────────────────────────────
function irPara(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(pageId).classList.add('active');
  limparMsgs();
}

function limparMsgs() {
  document.querySelectorAll('.msg').forEach(m => {
    m.className = 'msg';
    m.textContent = '';
  });
}

function mostrarMsg(id, texto, tipo) {
  const el = document.getElementById(id);
  el.className = 'msg ' + tipo;
  el.textContent = texto;
}

// ─── TOAST ───────────────────────────────────────────────────
function toast(msg, tipo = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (tipo === 'success' ? 'success-toast' : 'error-toast');
  setTimeout(() => t.className = 'toast', 3000);
}

// ─── CADASTRO ────────────────────────────────────────────────
async function fazerCadastro() {
  const email = document.getElementById('cad-email').value.trim();
  const cpf = document.getElementById('cad-cpf').value.trim();
  const senha = document.getElementById('cad-senha').value;
  const confirma = document.getElementById('cad-confirma').value;

  if (senha !== confirma) return mostrarMsg('cad-msg', 'As senhas não coincidem.', 'error');

  try {
    const res = await fetch(`${API}/usuarios/cadastrar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, cpf, senha })
    });
    const txt = await res.text();
    if (res.ok) {
      mostrarMsg('cad-msg', txt, 'success');
      setTimeout(() => irPara('page-login'), 1500);
    } else {
      mostrarMsg('cad-msg', txt, 'error');
    }
  } catch {
    mostrarMsg('cad-msg', 'Erro ao conectar com o servidor.', 'error');
  }
}

// ─── LOGIN ───────────────────────────────────────────────────
async function fazerLogin() {
  const email = document.getElementById('login-email').value.trim();
  const senha = document.getElementById('login-senha').value;

  try {
    const res = await fetch(`${API}/usuarios/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, senha })
    });
    const txt = await res.text();

    if (res.ok) {
      // Extrai o ID do usuário da resposta (busca por email no banco)
      await buscarUsuarioId(email, senha);
    } else {
      mostrarMsg('login-msg', txt, 'error');
    }
  } catch {
    mostrarMsg('login-msg', 'Erro ao conectar com o servidor.', 'error');
  }
}

async function buscarUsuarioId(email, senha) {
  usuarioId = 1;
    // Salva no navegador
    localStorage.setItem('usuarioId', usuarioId);
    localStorage.setItem('usuarioEmail', email);
    document.getElementById('nav-email').textContent = email;
    irPara('page-app');
    carregarProdutos();
    carregarCarrinho();
}

// ─── REDEFINIR SENHA ─────────────────────────────────────────
async function redefinirSenha() {
  const email = document.getElementById('rdf-email').value.trim();
  const cpf = document.getElementById('rdf-cpf').value.trim();
  const novaSenha = document.getElementById('rdf-senha').value;

  try {
    const res = await fetch(`${API}/usuarios/redefinir-senha`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, cpf, novaSenha })
    });
    const txt = await res.text();
    if (res.ok) {
      mostrarMsg('rdf-msg', txt, 'success');
      setTimeout(() => irPara('page-login'), 1500);
    } else {
      mostrarMsg('rdf-msg', txt, 'error');
    }
  } catch {
    mostrarMsg('rdf-msg', 'Erro ao conectar com o servidor.', 'error');
  }
}

// ─── PRODUTOS ────────────────────────────────────────────────
async function carregarProdutos() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';

  // Skeletons enquanto carrega
  for (let i = 0; i < 6; i++) {
    grid.innerHTML += `
      <div class="product-card">
        <div class="skeleton" style="height:12px;width:60%;margin-bottom:12px"></div>
        <div class="skeleton" style="height:20px;width:80%;margin-bottom:20px"></div>
        <div class="skeleton" style="height:32px;width:50%;margin-bottom:8px"></div>
        <div class="skeleton" style="height:12px;width:40%;margin-bottom:24px"></div>
        <div class="skeleton" style="height:40px;width:100%"></div>
      </div>`;
  }

  try {
    const res = await fetch(`${API}/produtos`);
    const produtos = await res.json();
    grid.innerHTML = '';

    if (produtos.length === 0) {
      grid.innerHTML = '<p style="color:var(--muted)">Nenhum produto disponível.</p>';
      return;
    }

    produtos.forEach((p, i) => {
      const semEstoque = p.quantidade === 0;
      const estoqueBaixo = p.quantidade > 0 && p.quantidade <= 2;
      grid.innerHTML += `
        <div class="product-card" style="animation-delay:${i * 60}ms">
          <div class="product-model">Apple</div>
          <div class="product-name">${p.nome}</div>
          <div class="product-price">R$ ${p.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
          <div class="product-stock ${estoqueBaixo ? 'low' : ''}">
            ${semEstoque ? 'Sem estoque' : estoqueBaixo ? `⚠ Últimas ${p.quantidade} unidades` : `${p.quantidade} em estoque`}
          </div>
          ${semEstoque ? `<button class="add-btn" disabled style="opacity:.4;cursor:not-allowed">Indisponível</button>` : `
          <div class="qty-row">
            <input class="qty-input" type="number" min="1" max="${p.quantidade}" value="1" id="qty-${p.id}">
            <button class="add-btn" onclick="adicionarAoCarrinho('${p.nome}', ${p.id})">+ Adicionar</button>
          </div>`}
        </div>`;
    });
  } catch {
    grid.innerHTML = '<p style="color:var(--danger)">Erro ao carregar produtos.</p>';
  }
}

// ─── CARRINHO ────────────────────────────────────────────────
async function adicionarAoCarrinho(nomeProduto, produtoId) {
  const qty = parseInt(document.getElementById(`qty-${produtoId}`).value) || 1;

  try {
    const res = await fetch(`${API}/carrinho/${usuarioId}/adicionar`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nomeProduto, quantidade: qty })
    });

    if (res.ok) {
      toast(`${nomeProduto} adicionado ao carrinho!`);
      carregarCarrinho();
    } else {
      const txt = await res.text();
      toast(txt, 'error');
    }
  } catch {
    toast('Erro ao adicionar produto.', 'error');
  }
}

async function carregarCarrinho() {
  try {
    const res = await fetch(`${API}/carrinho/${usuarioId}`);
    const data = await res.json();
    renderCarrinho(data.itens, data.total);
  } catch {}
}

function renderCarrinho(itens, total) {
  const container = document.getElementById('cart-items');
  const countEl = document.getElementById('cart-count');
  const totalEl = document.getElementById('cart-total');

  countEl.textContent = itens.length;
  totalEl.textContent = 'R$ ' + (total || 0).toLocaleString('pt-BR', {minimumFractionDigits:2});

  if (!itens || itens.length === 0) {
    container.innerHTML = '<div class="cart-empty">Seu carrinho está vazio</div>';
    return;
  }

  container.innerHTML = itens.map(item => `
    <div class="cart-item">
      <div class="cart-item-info">
        <div class="cart-item-name">${item.produto.nome}</div>
        <div class="cart-item-qty">${item.quantidade}x · R$ ${item.produto.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})} cada</div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="cart-item-price">R$ ${item.subtotal.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
        <button class="remove-item" onclick="removerItem(${item.id})" title="Remover">×</button>
      </div>
    </div>
  `).join('');
}

async function removerItem(itemId) {
  try {
    const res = await fetch(`${API}/carrinho/${usuarioId}/remover/${itemId}`, { method: 'DELETE' });
    if (res.ok) {
      toast('Item removido.');
      carregarCarrinho();
    }
  } catch {
    toast('Erro ao remover item.', 'error');
  }
}

async function finalizarCompra() {
  try {
    const res = await fetch(`${API}/carrinho/${usuarioId}/finalizar`, { method: 'POST' });
    const txt = await res.text();
    if (res.ok) {
      toast('Compra finalizada com sucesso! 🎉');
      fecharCarrinho();
      carregarCarrinho();
      carregarProdutos();
    } else {
      toast(txt, 'error');
    }
  } catch {
    toast('Erro ao finalizar compra.', 'error');
  }
}

function abrirCarrinho() {
  document.getElementById('cart-overlay').classList.add('open');
  document.getElementById('cart-panel').classList.add('open');
  carregarCarrinho();
}

function fecharCarrinho() {
  document.getElementById('cart-overlay').classList.remove('open');
  document.getElementById('cart-panel').classList.remove('open');
}

function logout() {
  usuarioId = null;
    // Limpa o navegador
    localStorage.removeItem('usuarioId');
    localStorage.removeItem('usuarioEmail');
    irPara('page-login');
    document.getElementById('login-email').value = '';
    document.getElementById('login-senha').value = '';
}

// Enter para login
document.getElementById('login-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') fazerLogin();
});

function verificarSessao() {
    const id = localStorage.getItem('usuarioId');
    const email = localStorage.getItem('usuarioEmail');
    if (id && email) {
        usuarioId = parseInt(id);
        document.getElementById('nav-email').textContent = email;
        irPara('page-app');
        carregarProdutos();
        carregarCarrinho();
    }
}

verificarSessao();
</script>
